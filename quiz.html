<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phishing Awareness Quiz</title>

<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#081120;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* ================= QUIZ CONTAINER ================= */

.quiz-container{
    width:100%;
    max-width:800px;
    background:#112240;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.quiz-container h1{
    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;
}

#question{
    margin-bottom:25px;
    line-height:1.5;
}

/* ================= BUTTONS ================= */

.btn{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

.btn:hover{
    background:rgb(11, 25, 27);
}

.correct{
    background:green !important;
}

.wrong{
    background:red !important;
}

/* ================= NEXT BUTTON ================= */

#next-btn{
    margin:25px auto 0;
    padding:14px 25px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    display:block;
    font-size:16px;
}

/* ================= RESULT ================= */

#result-box{
    margin-top:30px;
    text-align:center;
}

#result-box h2{
    color:#38bdf8;
    margin-bottom:20px;
}

#result-box p{
    margin:10px 0;
    font-size:18px;
}

#result-box h3{
    margin-top:20px;
    font-size:25px;
}

#result-box button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .quiz-container{
        padding:25px;
    }

    .btn{
        font-size:14px;
    }

}

</style>

</head>

<body>

<div class="quiz-container">

    <h1>Phishing Awareness Quiz</h1>

    <div id="question-container">

        <h2 id="question"></h2>

        <div id="answer-buttons"></div>

    </div>

    <button id="next-btn">
        Next
    </button>

    <div id="result-box"></div>

</div>

<script>

/* ================= QUESTIONS ================= */

const questions = [

{
question:"What is phishing?",
answers:[
{text:"Cyber attack",correct:true},
{text:"Malware",correct:false},
{text:"Database",correct:false},
{text:"Software",correct:false}
]
},

{
question:"Which is a phishing sign?",
answers:[
{text:"Urgent threatening message",correct:true},
{text:"Strong password",correct:false},
{text:"HTTPS website",correct:false},
{text:"Official logo",correct:false}
]
},

{
question:"What is smishing?",
answers:[
{text:"SMS phishing",correct:true},
{text:"Voice call",correct:false},
{text:"Firewall",correct:false},
{text:"Antivirus",correct:false}
]
},

{
question:"What is vishing?",
answers:[
{text:"Voice phishing",correct:true},
{text:"VPN",correct:false},
{text:"Operating system",correct:false},
{text:"Coding language",correct:false}
]
},

{
question:"Which should never be shared?",
answers:[
{text:"OTP",correct:true},
{text:"Wallpaper",correct:false},
{text:"Brightness",correct:false},
{text:"Theme",correct:false}
]
},

{
question:"Which URL looks suspicious?",
answers:[
{text:"paypa1.com",correct:true},
{text:"paypal.com",correct:false},
{text:"amazon.com",correct:false},
{text:"google.com",correct:false}
]
},

{
question:"Why do attackers create urgency?",
answers:[
{text:"To panic victims",correct:true},
{text:"To help users",correct:false},
{text:"To improve speed",correct:false},
{text:"To increase internet",correct:false}
]
},

{
question:"Which is safer?",
answers:[
{text:"HTTPS website",correct:true},
{text:"Unknown popup",correct:false},
{text:"Fake website",correct:false},
{text:"Suspicious link",correct:false}
]
},

{
question:"What is social engineering?",
answers:[
{text:"Manipulating people",correct:true},
{text:"Programming",correct:false},
{text:"Database system",correct:false},
{text:"Manipulating Computer",correct:false}
]
},

{
question:"Which email looks fake?",
answers:[
{text:"paypal-help123@gmail.com",correct:true},
{text:"service@paypal.com",correct:false},
{text:"support@amazon.com",correct:false},
{text:"help@google.com",correct:false}
]
},

{
question:"What should you check before clicking links?",
answers:[
{text:"URL",correct:true},
{text:"Battery",correct:false},
{text:"Brightness",correct:false},
{text:"Wallpaper",correct:false}
]
},

{
question:"Which attack targets executives?",
answers:[
{text:"Whaling",correct:true},
{text:"Gaming",correct:false},
{text:"VPN",correct:false},
{text:"Firewall",correct:false}
]
},

{
question:"What is clone phishing?",
answers:[
{text:"Copy of legitimate email",correct:true},
{text:"Virus",correct:false},
{text:"Software update",correct:false},
{text:"WiFi attack",correct:false}
]
},

{
question:"What helps protect accounts?",
answers:[
{text:"Multi-Factor Authentication",correct:true},
{text:"Weak password",correct:false},
{text:"Ignoring updates",correct:false},
{text:"Sharing OTP",correct:false}
]
},

{
question:"What should you do with suspicious emails?",
answers:[
{text:"Verify sender",correct:true},
{text:"Click immediately",correct:false},
{text:"Share password",correct:false},
{text:"Ignore security",correct:false}
]
}

];

/* ================= VARIABLES ================= */

let questionIndex = 0;
let score = 0;
let wrong = 0;

const questionElement =
document.getElementById("question");

const answerButtons =
document.getElementById("answer-buttons");

const nextButton =
document.getElementById("next-btn");

/* ================= START QUIZ ================= */

function startQuiz(){

    questionIndex = 0;
    score = 0;
    wrong = 0;

    showQuestion();
}

/* ================= SHOW QUESTION ================= */

function showQuestion(){

    resetState();

    let currentQuestion =
    questions[questionIndex];

    questionElement.innerHTML =
    `${questionIndex + 1}. ${currentQuestion.question}`;

    currentQuestion.answers.forEach(answer=>{

        const button =
        document.createElement("button");

        button.innerHTML =
        answer.text;

        button.classList.add("btn");

        answerButtons.appendChild(button);

        if(answer.correct){
            button.dataset.correct =
            answer.correct;
        }

        button.addEventListener("click",
        selectAnswer);

    });

}

/* ================= RESET ================= */

function resetState(){

    nextButton.style.display = "block";

    while(answerButtons.firstChild){

        answerButtons.removeChild(
        answerButtons.firstChild);

    }
}

/* ================= SELECT ANSWER ================= */

function selectAnswer(e){

    const selectedBtn =
    e.target;

    const isCorrect =
    selectedBtn.dataset.correct === "true";

    if(isCorrect){

        selectedBtn.classList.add("correct");

        score++;

    }

    else{

        selectedBtn.classList.add("wrong");

        wrong++;

    }

    Array.from(answerButtons.children)
    .forEach(button=>{

        if(button.dataset.correct === "true"){

            button.classList.add("correct");

        }

        button.disabled = true;

    });

}

/* ================= SHOW RESULT ================= */

function showResult(){

    resetState();

    let percentage =
    Math.round((score / questions.length) * 100);

    questionElement.innerHTML =
    "Quiz Completed!";

    document.getElementById("result-box")
    .innerHTML =

    `
    <h2>Quiz Result</h2>

    <p>Total Questions : ${questions.length}</p>

    <p>Correct Answers : ${score}</p>

    <p>Wrong Answers : ${wrong}</p>

    <p>Percentage : ${percentage}%</p>

    <h3>
    ${percentage >= 50 ?
    "✅ Passed" :
    "❌ Failed"}
    </h3>

    <button onclick="location.reload()">
    Restart Quiz
    </button>
    `;
}

/* ================= NEXT BUTTON ================= */

function handleNextButton(){

    questionIndex++;

    if(questionIndex < questions.length){

        showQuestion();

    }

    else{

        showResult();

    }
}

nextButton.addEventListener("click",()=>{

    handleNextButton();

});

/* ================= START ================= */

startQuiz();

</script>

</body>
</html>
